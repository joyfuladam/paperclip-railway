name: Sync upstream Paperclip release

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest upstream release tag
        id: upstream
        run: |
          TAG=$(curl -sSf https://api.github.com/repos/paperclipai/paperclip/releases/latest \
            -H "Accept: application/vnd.github+json" \
            | jq -r .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: $TAG"

      - name: Get current pinned ref
        id: current
        run: |
          REF=$(grep 'ARG PAPERCLIP_REF=' Dockerfile | head -1 | sed 's/.*PAPERCLIP_REF=//')
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Current pinned ref: $REF"

      - name: Update Dockerfile and commit if changed
        if: steps.upstream.outputs.tag != steps.current.outputs.ref && steps.upstream.outputs.tag != 'null'
        run: |
          NEW_TAG="${{ steps.upstream.outputs.tag }}"
          OLD_TAG="${{ steps.current.outputs.ref }}"

          sed -i "s|ARG PAPERCLIP_REF=.*|ARG PAPERCLIP_REF=${NEW_TAG}|" Dockerfile

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Dockerfile
          git commit -m "chore: bump Paperclip ${OLD_TAG} → ${NEW_TAG}"
          git push origin main

          echo "Updated Dockerfile to $NEW_TAG — Railway will redeploy automatically."
